<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic greeting generator</title>
    <link rel="stylesheet" href="chat.css">
    <script src="greeting.js"></script>
</head>
<body>

    <!-- greeting mini project -->
    <div class="style">
        <div>

            <h2>Dynamic greeting generator</h2>
            
            <input type="text" id="userinput" placeholder="Enter Your First Name">

            <input type="button" id="btn" value="click" onclick="charName()">
            
            <h1 id="message"></h1>
        </div>
    </div>

    <script>
        
        // :: Final validation of input
        function charName(){ 
            
            let para = document.getElementById("userinput");
            let userText = para.value;
            
            // pattern only character A to z and a to z lower and upper both allowed
    
            let Regu = /^[A-Za-z]+$/;
            let res = userText.match(Regu);
            if(res){
                if ((para.value).length >= 3){
                    let result = `Hello ${para.value}, welcome to the website!`;
                    document.getElementById("message").innerHTML = result;
            // ? invalid error show work on it also for max 10 character allowed not more than this show this error if > 10 char
                } else if((para.value).length >= 10){
                    let msgError1 = "You can enter Maximum 10 characters";
                    alert(msgError1);
                } else {
                    let msgError2 = "please enter at least 3 characters";
                    alert(msgError2);
                }              
            } else {
                let charError = "please enter only Alphabets";
                alert(charError);
            }
        }


        

        // IGNORE THIS ::: BUG1 Status:critical >> IMP:validation of characters still invalid like number,special characters and spaces are allowed need to fix later
        
    </script>


    
</body>
</html>
